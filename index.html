<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control Systems Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ANIMATED BACKGROUND -->
  <canvas id="bgCanvas"></canvas>
  <div class="grid-overlay"></div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">CTRL<em>SYS</em></span>
        <span class="logo-bracket">]</span>
      </div>
      <p class="logo-sub">Control Systems Engineering Calculator</p>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="routh">
      <span class="tab-icon">⬡</span>
      Routh-Hurwitz
    </button>
    <button class="tab-btn" data-tab="pid">
      <span class="tab-icon">⟳</span>
      PID Controller
    </button>
    <button class="tab-btn" data-tab="zn1">
      <span class="tab-icon">∿</span>
      Ziegler-Nichols 1
    </button>
    <button class="tab-btn" data-tab="zn2">
      <span class="tab-icon">◎</span>
      Ziegler-Nichols 2
    </button>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TAB: ROUTH-HURWITZ -->
    <section class="tab-panel active" id="tab-routh">
      <div id="routh-app"></div>
    </section>

    <!-- TAB: PID -->
    <section class="tab-panel" id="tab-pid">
      <div id="pid-app"></div>
    </section>

    <!-- TAB: ZIEGLER-NICHOLS 1 -->
    <section class="tab-panel" id="tab-zn1">
      <div id="zn1-app"></div>
    </section>

    <!-- TAB: ZIEGLER-NICHOLS 2 -->
    <section class="tab-panel" id="tab-zn2">
      <div id="zn2-app"></div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Control Systems Engineering Calculator &mdash; Built for Engineers &copy; 2025</p>
  </footer>

  <!-- SCRIPTS (order matters: utils → calculators → renderers → main) -->
  <script src="js/utils.js"></script>
  <script src="js/calc-routh.js"></script>
  <script src="js/calc-pid.js"></script>
  <script src="js/calc-zn1.js"></script>
  <script src="js/calc-zn2.js"></script>
  <script src="js/render-routh.js"></script>
  <script src="js/render-pid.js"></script>
  <script src="js/render-zn1.js"></script>
  <script src="js/background.js"></script>
  <script src="js/main.js"></script>
<!-- taruh sebelum </body> -->
<audio id="bgMusic" loop>
  <source src="music/bgMusic.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");

// Coba play saat halaman dimuat
window.addEventListener("load", () => {
  music.volume = 0.4;
  music.play().catch(() => {
    // Browser blokir autoplay, tunggu interaksi user
    console.log("Autoplay diblokir, menunggu klik...");
  });
});

// Fallback: mainkan saat klik pertama
document.addEventListener("click", () => {
  if (music.paused) {
    music.volume = 0.4;
    music.play();
  }
}, { once: true });
</script>

</body>
</html>
