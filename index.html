<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control Systems Calculator</title>
  <link rel="stylesheet" href="css/main.css" />
  <!-- Google Fonts: JetBrains Mono for monospace -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ANIMATED BACKGROUND -->
  <canvas id="bgCanvas"></canvas>
  <div class="grid-overlay"></div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">⚙ Control Systems Calculator</div>
      <p class="logo-sub">Engineering Tool — PID, Routh-Hurwitz, Ziegler-Nichols</p>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="routh">
      <span class="tab-icon">⬡</span>
      Routh-Hurwitz
    </button>
    <button class="tab-btn" data-tab="pid">
      <span class="tab-icon">⟳</span>
      PID Controller
    </button>
    <button class="tab-btn" data-tab="zn1">
      <span class="tab-icon">∿</span>
      Ziegler-Nichols 1
    </button>
    <button class="tab-btn" data-tab="zn2">
      <span class="tab-icon">◎</span>
      Ziegler-Nichols 2
    </button>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <section class="tab-panel active" id="tab-routh">
      <div id="routh-app"></div>
    </section>

    <section class="tab-panel" id="tab-pid">
      <div id="pid-app"></div>
    </section>

    <section class="tab-panel" id="tab-zn1">
      <div id="zn1-app"></div>
    </section>

    <section class="tab-panel" id="tab-zn2">
      <div id="zn2-app"></div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Control Systems Engineering Calculator &mdash; Built for Engineers &copy; 2025</p>
  </footer>

  <!--
    SCRIPT LOADING ORDER (Separation of Concerns):
    1. utils.js        — shared utilities (fmt, round, etc.)
    2. calc-*.js       — pure math calculators (no DOM)
    3. chart-engine.js — step response simulation + canvas renderer + suggestion engine
    4. render-*.js     — DOM renderers (call calc-* and chart-engine)
    5. background.js   — animated canvas background
    6. main.js         — tab navigation + initialization
  -->
  <script src="js/utils.js"></script>
  <script src="js/calc-routh.js"></script>
  <script src="js/calc-pid.js"></script>
  <script src="js/calc-zn1.js"></script>
  <script src="js/calc-zn2.js"></script>
  <script src="js/chart-engine.js"></script>
  <script src="js/chart-zn1-openloop.js"></script>
  <script src="js/render-routh.js"></script>
  <script src="js/render-pid.js"></script>
  <script src="js/render-zn1.js"></script>
  <script src="js/render-zn2.js"></script>
  <script src="js/background.js"></script>
  <script src="js/main.js"></script>

  <!-- Background music (optional — browser may block autoplay) -->
  <audio id="bgMusic" loop>
    <source src="music/bgMusic.mp3" type="audio/mpeg">
  </audio>
  <script>
    const music = document.getElementById("bgMusic");
    window.addEventListener("load", () => {
      music.volume = 0.3;
      music.play().catch(() => {
        console.log("Autoplay diblokir — menunggu interaksi user.");
      });
    });
    document.addEventListener("click", () => {
      if (music.paused) { music.volume = 0.3; music.play(); }
    }, { once: true });
  </script>

</body>
</html>
